<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#8f2d4e"><title>DPRO パティスリー｜予約確認</title>
<style>
:root{--bg:#faf5ed;--paper:#fffdfa;--ink:#3e2924;--muted:#796b64;--line:#eadccf;--berry:#ac3157;--berry2:#7f2541;--cocoa:#613b34;--sage:#4c7559;--gold:#b47b28;--red:#a4313d;--shadow:0 14px 34px #5b382015}*{box-sizing:border-box}html{font-size:17px}body{margin:0;background:linear-gradient(145deg,#fbf6ed,#f8ecec);color:var(--ink);font:17px/1.65 system-ui,-apple-system,"Segoe UI",sans-serif}button,input,textarea{font:inherit;font-size:17px}.hidden{display:none!important}.top{position:sticky;top:0;z-index:20;background:#fffdfaf2;backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.topin{max-width:980px;margin:auto;min-height:72px;padding:9px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:11px}.mark{width:46px;height:46px;border-radius:14px;background:var(--berry);color:#fff;display:grid;place-items:center;font-size:23px}.brand strong{font-size:19px}.small{font-size:14px;color:var(--muted)}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;border:0;border-radius:12px;padding:9px 17px;background:var(--berry);color:#fff;font-weight:850;text-decoration:none;cursor:pointer}.btn:hover{background:var(--berry2)}.btn.sub{background:#efe4da;color:var(--cocoa)}.btn.danger{background:#fff0f1;color:var(--red);border:1px solid #e6b4ba}.wrap{max-width:980px;margin:auto;padding:22px 18px 80px}.hero{background:linear-gradient(135deg,#5a332e,#862c49);color:#fff;border-radius:22px;padding:26px;box-shadow:var(--shadow)}.hero h1{font-size:29px;line-height:1.35;margin:0}.hero p{margin:7px 0 0;color:#f4dfdf}.customer{display:grid;grid-template-columns:1fr auto;gap:15px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:17px;padding:18px;margin-top:16px;box-shadow:var(--shadow)}.customer h2{font-size:21px;margin:0}.notice{padding:13px 15px;border-radius:12px;background:#fff5dd;color:#6f4a10;margin:16px 0}.notice.error{background:#fff0f1;color:#8b2935}.tabs{display:flex;gap:8px;margin:20px 0 14px}.tab{min-height:46px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:8px 17px;color:var(--ink);font-weight:800;cursor:pointer}.tab.active{background:var(--cocoa);color:#fff;border-color:var(--cocoa)}.orders{display:grid;gap:14px}.order{background:var(--paper);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}.orderhead{display:flex;justify-content:space-between;gap:12px;padding:16px 18px;background:#f8eee7}.date{font-size:20px;font-weight:900}.status{align-self:start;border-radius:999px;padding:5px 10px;font-size:14px;font-weight:850;background:#e8f3ea;color:#386344}.status.cancel{background:#ffe7e9;color:#8e2c38}.status.done{background:#eeeae7;color:#665c57}.body{padding:18px}.number{color:var(--muted);font-size:14px}.items{display:grid;gap:9px;margin:13px 0}.item{display:grid;grid-template-columns:1fr auto;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}.item:last-child{border:0}.item strong{display:block}.meta{color:var(--muted);font-size:14px}.total{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:13px;font-weight:900}.total b{font-size:22px;color:var(--berry2)}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:15px}.empty{text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:48px 18px;color:var(--muted)}.loading{text-align:center;padding:45px}.modalback{position:fixed;inset:0;background:#2f1a17aa;z-index:50;display:grid;place-items:center;padding:18px}.modal{width:min(620px,100%);max-height:90vh;overflow:auto;background:var(--paper);border-radius:20px;padding:22px;box-shadow:0 25px 70px #24100d55}.modal h2{margin:0 0 12px}.photos{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.photos img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;border:1px solid var(--line)}textarea{width:100%;min-height:110px;border:1px solid #d8c6b8;border-radius:12px;padding:11px;background:#fff}.modalactions{display:flex;justify-content:flex-end;gap:9px;margin-top:16px}.toast{position:fixed;right:18px;bottom:18px;z-index:70;max-width:410px;background:#294032;color:#fff;padding:13px 17px;border-radius:12px;box-shadow:var(--shadow)}
@media(max-width:600px){.wrap{padding:14px 12px 75px}.topin{padding:8px 12px}.hero{padding:22px 18px}.hero h1{font-size:25px}.customer{grid-template-columns:1fr}.top .btn.sub{display:none}.orderhead,.body{padding:14px}.photos{grid-template-columns:1fr}.modalactions{display:grid}.modalactions .btn{width:100%}}
</style></head><body>
<header class="top"><div class="topin"><div class="brand"><div class="mark">♛</div><div><strong id="shopName">DPRO パティスリー</strong><div class="small">ご予約確認ページ</div></div></div><a href="index.html" class="btn sub">新しく予約</a></div></header>
<main class="wrap"><section class="hero"><h1>ご予約内容を、いつでも確認。</h1><p>受取日時・商品内容・お支払い予定金額をご確認いただけます。</p></section><div id="message" class="notice hidden"></div><section id="customerCard" class="customer hidden"><div><div class="small">お客様情報</div><h2 id="customerName"></h2><div id="customerMeta" class="small"></div></div><a href="index.html" class="btn">新しく予約する</a></section><div class="tabs"><button class="tab active" data-filter="active">今後の予約</button><button class="tab" data-filter="history">過去・取消</button><button class="tab" data-filter="all">すべて</button></div><div id="loading" class="loading">予約情報を読み込んでいます…</div><section id="orders" class="orders"></section></main>
<div id="detailModal" class="modalback hidden"><div class="modal"><div id="detailBody"></div><div class="modalactions"><button class="btn sub" data-close>閉じる</button></div></div></div><div id="cancelModal" class="modalback hidden"><div class="modal"><h2>キャンセルを依頼</h2><p>店舗で確認後にキャンセルが確定します。送信した時点では確定していません。</p><textarea id="cancelReason" placeholder="キャンセル理由をご入力ください（任意）"></textarea><div class="modalactions"><button class="btn sub" data-close>戻る</button><button id="sendCancel" class="btn danger">キャンセル依頼を送信</button></div></div></div><div id="toast" class="toast hidden"></div>
<script src="config.js"></script><script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><script>
(()=>{"use strict";const C=window.DPRO_CAKE_CONFIG||{apiBase:"https://dpro-cake-line-api.dpromstk2000.workers.dev",demoLineUserId:"cake_demo_line_001"},$=id=>document.getElementById(id);let lineId="",orders=[],filter="active",cancelOrder=null;const esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])),yen=v=>`¥${Number(v||0).toLocaleString("ja-JP")}`,today=()=>new Intl.DateTimeFormat("sv-SE",{timeZone:"Asia/Tokyo"}).format(new Date());
async function api(path,opt={}){const r=await fetch(C.apiBase+path,{...opt,headers:{"Content-Type":"application/json",...(opt.headers||{})}});let d={};try{d=await r.json()}catch{}if(!r.ok)throw Error(d.message||`通信エラー ${r.status}`);return d}function toast(m,b=false){const e=$("toast");e.textContent=m;e.style.background=b?"#8d2935":"#294032";e.classList.remove("hidden");clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.add("hidden"),3500)}function showMessage(m,b=false){const e=$("message");e.textContent=m;e.className=`notice${b?" error":""}`}
async function resolveLineId(){const q=new URLSearchParams(location.search);if(q.get("line_user_id"))return q.get("line_user_id");if(q.get("demo")==="1")return C.demoLineUserId||"cake_demo_line_001";if(window.liff&&C.liffId){try{await liff.init({liffId:C.liffId});if(liff.isLoggedIn()){const p=await liff.getProfile();return p.userId}}catch(e){console.warn(e)}}return C.demoLineUserId||"cake_demo_line_001"}
async function load(){try{lineId=await resolveLineId();const [shop,customer,data]=await Promise.all([api("/api/shop"),api(`/api/customer/by-line?line_user_id=${encodeURIComponent(lineId)}`),api(`/api/member/orders?line_user_id=${encodeURIComponent(lineId)}`)]);$("shopName").textContent=shop.shop?.shop_name||"DPRO パティスリー";if(customer.found){$("customerCard").classList.remove("hidden");$("customerName").textContent=`${customer.customer.customer_name} 様`;$("customerMeta").textContent=`会員番号 ${customer.customer.customer_no}　${customer.customer.phone||""}`}orders=data.orders||[];$("loading").classList.add("hidden");render()}catch(e){$("loading").classList.add("hidden");showMessage(e.message,true)}}
function isActive(o){return ["reserved","confirmed","preparing","ready","cancel_requested"].includes(o.order_status)&&o.pickup_date>=today()}function visible(){if(filter==="active")return orders.filter(isActive).sort((a,b)=>(a.pickup_date+a.pickup_time).localeCompare(b.pickup_date+b.pickup_time));if(filter==="history")return orders.filter(o=>!isActive(o));return orders}function statusLabel(s){return({reserved:"予約受付",confirmed:"店舗確認済み",preparing:"製作中",ready:"受取準備完了",handed_over:"受取済み",cancel_requested:"取消確認中",cancelled:"取消済み",no_show:"未受取"})[s]||s}function statusClass(s){return ["cancelled","cancel_requested","no_show"].includes(s)?"cancel":["handed_over"].includes(s)?"done":""}
function render(){const list=visible();$("orders").innerHTML=list.length?list.map(orderHtml).join(""):`<div class="empty">${filter==="active"?"今後のご予約はありません。":"該当する予約はありません。"}<br><br><a href="index.html" class="btn">新しく予約する</a></div>`;document.querySelectorAll("[data-detail]").forEach(b=>b.onclick=()=>openDetail(b.dataset.detail));document.querySelectorAll("[data-cancel]").forEach(b=>b.onclick=()=>openCancel(b.dataset.cancel))}
function orderHtml(o){const items=o.cake_order_items||[];return `<article class="order"><div class="orderhead"><div><div class="date">${esc(o.pickup_date)}　${esc(String(o.pickup_time||"").slice(0,5))}</div><div class="number">予約番号 ${esc(o.order_no)}</div></div><span class="status ${statusClass(o.order_status)}">${esc(statusLabel(o.order_status))}</span></div><div class="body"><div class="items">${items.slice(0,3).map(i=>`<div class="item"><div><strong>${esc(i.product_name)}</strong><span class="meta">${esc(i.variant_name||"")} × ${i.quantity}</span></div><span>${yen(i.line_total)}</span></div>`).join("")}${items.length>3?`<div class="meta">ほか${items.length-3}点</div>`:""}</div><div class="total"><span>お支払い予定</span><b>${yen(o.total_amount)}</b></div><div class="actions"><button class="btn sub" data-detail="${esc(o.order_no)}">詳しく確認</button>${["reserved","confirmed"].includes(o.order_status)?`<button class="btn danger" data-cancel="${esc(o.order_no)}">キャンセル依頼</button>`:""}<a class="btn" href="index.html">同じ店舗で予約</a></div></div></article>`}
async function openDetail(no){const o=orders.find(x=>x.order_no===no);if(!o)return;$("detailBody").innerHTML='<div class="loading">詳細を読み込んでいます…</div>';$("detailModal").classList.remove("hidden");try{const d=await api(`/api/orders/${encodeURIComponent(no)}?access_token=${encodeURIComponent(o.access_token)}`);renderDetail(d.order)}catch(e){$("detailBody").innerHTML=`<div class="notice error">${esc(e.message)}</div>`}}
function renderDetail(o){const items=o.cake_order_items||[],photos=o.cake_order_photos||[];$("detailBody").innerHTML=`<h2>ご予約詳細</h2><div class="notice"><strong>${esc(o.pickup_date)} ${esc(String(o.pickup_time||"").slice(0,5))}</strong><br>予約番号 ${esc(o.order_no)}／${esc(statusLabel(o.order_status))}</div><div class="items">${items.map(i=>`<div class="item"><div><strong>${esc(i.product_name)}</strong><div class="meta">${esc(i.variant_name||"")} × ${i.quantity}${i.message_plate_text?`<br>プレート：${esc(i.message_plate_text)}`:""}${i.candle_note?`<br>ろうそく：${esc(i.candle_note)}`:""}${i.item_note?`<br>商品メモ：${esc(i.item_note)}`:""}</div>${(i.cake_order_item_options||[]).map(x=>`<div class="meta">・${esc(x.option_name)}${x.option_text?`：${esc(x.option_text)}`:""}</div>`).join("")}</div><span>${yen(i.line_total)}</span></div>`).join("")}</div><div class="total"><span>合計</span><b>${yen(o.total_amount)}</b></div>${o.customer_note?`<p><strong>その他のご希望</strong><br>${esc(o.customer_note)}</p>`:""}${photos.length?`<h3>登録写真</h3><div class="photos">${photos.filter(p=>p.signed_url).map(p=>`<img src="${esc(p.signed_url)}" alt="注文写真">`).join("")}</div>`:""}`}
function openCancel(no){cancelOrder=orders.find(x=>x.order_no===no);$("cancelReason").value="";$("cancelModal").classList.remove("hidden")}async function sendCancel(){if(!cancelOrder)return;try{$("sendCancel").disabled=true;await api(`/api/orders/${encodeURIComponent(cancelOrder.order_no)}/cancel-request`,{method:"POST",body:JSON.stringify({access_token:cancelOrder.access_token,reason:$("cancelReason").value})});$("cancelModal").classList.add("hidden");toast("キャンセル依頼を送信しました。店舗からの確認をお待ちください。");const d=await api(`/api/member/orders?line_user_id=${encodeURIComponent(lineId)}`);orders=d.orders||[];render()}catch(e){toast(e.message,true)}finally{$("sendCancel").disabled=false}}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===b));render()});document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>b.closest(".modalback").classList.add("hidden"));document.querySelectorAll(".modalback").forEach(m=>m.onclick=e=>{if(e.target===m)m.classList.add("hidden")});$("sendCancel").onclick=sendCancel;load();
})();</script></body></html>
