<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6b3540">
  <title>DPRO パティスリー｜オーナー管理</title>
  <style>
    :root{--bg:#f8f3eb;--paper:#fffdf9;--ink:#3d2924;--muted:#786a64;--line:#e7dbcf;--berry:#a83255;--berry2:#7d263f;--cocoa:#5b342f;--gold:#b57b28;--sage:#56755e;--danger:#a62f3b;--shadow:0 14px 35px rgba(79,49,38,.1)}
    *{box-sizing:border-box}html{font-size:17px}body{margin:0;background:linear-gradient(135deg,#fbf6ed,#f7eceb);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:17px;line-height:1.65}button,input,select,textarea{font:inherit;font-size:17px}button{cursor:pointer}.hidden{display:none!important}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(500px,100%);background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:34px;box-shadow:var(--shadow)}
    .logo{display:flex;align-items:center;gap:13px}.logo-mark{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:var(--berry);color:#fff;font-size:24px}.logo strong{font-size:20px}.sub{color:var(--muted);font-size:14px}.field{display:grid;gap:7px;margin-top:20px}.field label{font-weight:800}.control{width:100%;min-height:52px;border:1px solid #d8c9bd;border-radius:12px;padding:11px 13px;background:#fff;color:var(--ink)}textarea.control{min-height:112px;resize:vertical}.btn{border:0;border-radius:12px;min-height:50px;padding:10px 18px;font-weight:850;background:var(--berry);color:#fff}.btn:hover{background:var(--berry2)}.btn.secondary{background:#efe5db;color:var(--cocoa)}.btn.danger{background:#fff0f1;color:var(--danger);border:1px solid #e9b7bd}.btn.small{min-height:44px;padding:7px 13px;font-size:15px}.login-actions{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:20px}
    .app{min-height:100vh}.top{position:sticky;top:0;z-index:20;background:rgba(255,253,249,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.top-inner{max-width:1440px;margin:auto;min-height:76px;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;gap:18px}.top-actions{display:flex;gap:9px;align-items:center}.status{font-size:14px;color:var(--sage);font-weight:800}
    .layout{max-width:1440px;margin:auto;display:grid;grid-template-columns:245px minmax(0,1fr);gap:22px;padding:22px}.side{position:sticky;top:98px;align-self:start;background:var(--cocoa);border-radius:20px;padding:14px;color:#fff}.nav{width:100%;border:0;border-radius:12px;padding:13px 14px;margin:3px 0;text-align:left;background:transparent;color:#f6eae4;font-weight:800}.nav.active{background:#fff;color:var(--berry2)}.main{min-width:0}.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:15px;margin-bottom:18px}.page-head h1{margin:0;font-size:28px;line-height:1.3}.page-head p{margin:4px 0 0;color:var(--muted)}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.metric,.panel{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.metric{padding:19px}.metric b{display:block;font-size:30px;color:var(--berry2)}.metric span{color:var(--muted);font-size:14px}.panel{padding:20px;margin-top:18px}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.toolbar .control{width:auto;min-width:180px}.notice{padding:13px 15px;border-radius:12px;background:#fff6df;color:#744f15;margin:0 0 16px}.error{background:#fff0f1;color:#8e2633}.success{background:#eaf6ed;color:#315f3d}
    .product-list{display:grid;gap:15px}.product{background:var(--paper);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:grid;grid-template-columns:230px minmax(0,1fr)}.photo{min-height:230px;background:linear-gradient(145deg,#f8e2e2,#f3d5db);display:grid;place-items:center;position:relative;overflow:hidden}.photo img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}.photo-placeholder{font-size:52px}.photo-badge{position:absolute;left:10px;top:10px;background:rgba(255,255,255,.92);border-radius:999px;padding:5px 9px;font-size:14px;font-weight:800}.product-body{padding:20px}.product-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.product-title h2{font-size:21px;margin:0}.chips{display:flex;flex-wrap:wrap;gap:7px}.chip{border-radius:999px;padding:4px 9px;font-size:14px;font-weight:800;background:#f1e7df}.chip.sold{background:#ffe4e7;color:#8f2634}.chip.live{background:#e8f3e9;color:#3b6945}.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-top:15px}.form-grid .field{margin:0}.wide{grid-column:1/-1}.checks{display:flex;flex-wrap:wrap;gap:18px;margin-top:13px}.check{display:flex;align-items:center;gap:8px;font-weight:750}.check input{width:21px;height:21px}.product-actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;padding-top:15px;border-top:1px solid var(--line)}.file{position:absolute;opacity:0;width:1px;height:1px}.orders{display:grid;gap:10px}.order{padding:16px;border:1px solid var(--line);border-radius:14px;background:#fff}.order-top{display:flex;justify-content:space-between;gap:12px;font-weight:800}.order-meta{color:var(--muted);margin-top:4px}.empty{text-align:center;padding:45px 15px;color:var(--muted)}
    .toast{position:fixed;right:22px;bottom:22px;z-index:50;max-width:420px;padding:14px 18px;border-radius:13px;background:#263d2d;color:#fff;box-shadow:var(--shadow)}
    @media(max-width:900px){.layout{grid-template-columns:1fr;padding:14px}.side{position:static;display:flex;overflow:auto;border-radius:14px}.nav{white-space:nowrap;width:auto}.cards{grid-template-columns:repeat(2,1fr)}.product{grid-template-columns:180px 1fr}.form-grid{grid-template-columns:1fr 1fr}.top-inner{padding:9px 14px}.top .sub,.status{display:none}}
    @media(max-width:620px){.cards{grid-template-columns:1fr 1fr}.product{grid-template-columns:1fr}.photo{min-height:210px}.form-grid{grid-template-columns:1fr}.wide{grid-column:auto}.page-head{display:block}.top-actions .btn.secondary{display:none}.login-card{padding:25px 20px}.login-actions{grid-template-columns:1fr}.product-title{display:block}.chips{margin-top:8px}}
  </style>
</head>
<body>
  <section id="login" class="login">
    <div class="login-card">
      <div class="logo"><div class="logo-mark">♛</div><div><strong>DPRO パティスリー</strong><div class="sub">オーナーPC管理画面｜STEP CAKE-5</div></div></div>
      <div class="field"><label for="adminCode">管理コード</label><input id="adminCode" class="control" type="password" inputmode="numeric" autocomplete="current-password" placeholder="管理コードを入力"></div>
      <div class="login-actions"><button id="loginButton" class="btn">管理画面を開く</button><button id="clearCode" class="btn secondary" type="button">削除</button></div>
      <p id="loginMessage" class="notice error hidden" style="margin-top:16px"></p>
    </div>
  </section>

  <div id="app" class="app hidden">
    <header class="top"><div class="top-inner"><div class="logo"><div class="logo-mark">♛</div><div><strong id="shopName">DPRO パティスリー</strong><div class="sub">予約・商品・写真を一元管理</div></div></div><div class="top-actions"><span id="apiStatus" class="status">API接続中</span><a class="btn secondary small" href="index.html" target="_blank">お客様画面</a><button id="logout" class="btn danger small">ログアウト</button></div></div></header>
    <div class="layout">
      <aside class="side"><button class="nav active" data-view="dashboard">今日の状況</button><button class="nav" data-view="orders">予約一覧</button><button class="nav" data-view="products">商品・写真管理</button><button class="nav" data-view="settings">予約設定</button></aside>
      <main class="main">
        <section id="view-dashboard" class="view"><div class="page-head"><div><h1>今日の状況</h1><p>予約数と受け渡し状況を確認できます。</p></div><button class="btn secondary" data-reload>再読込</button></div><div id="metrics" class="cards"></div><div class="panel"><h2>本日の予約</h2><div id="todayOrders" class="orders"></div></div></section>
        <section id="view-orders" class="view hidden"><div class="page-head"><div><h1>予約一覧</h1><p>受取日・状態・お客様情報から確認します。</p></div><button class="btn secondary" data-reload>再読込</button></div><div class="panel"><div class="toolbar"><input id="orderDate" class="control" type="date"><select id="orderStatus" class="control"><option value="">すべての状態</option><option value="reserved">予約受付</option><option value="confirmed">確認済み</option><option value="preparing">製作中</option><option value="ready">受渡準備完了</option><option value="handed_over">受渡済み</option><option value="cancel_requested">取消依頼</option><option value="cancelled">取消済み</option></select><input id="orderQuery" class="control" placeholder="氏名・電話・予約番号"><button id="searchOrders" class="btn">検索</button></div><div id="orderList" class="orders" style="margin-top:16px"></div></div></section>
        <section id="view-products" class="view hidden"><div class="page-head"><div><h1>商品・写真管理</h1><p>写真の登録・差し替え・削除、商品情報と販売状態を変更できます。</p></div><button class="btn secondary" data-reload>再読込</button></div><p class="notice">画像はJPEG・PNG・WebP、5MB以下。アップロード前に画面側で長辺1600px程度へ縮小します。</p><div id="productList" class="product-list"></div></section>
        <section id="view-settings" class="view hidden"><div class="page-head"><div><h1>予約設定</h1><p>受付期間・製作上限・案内文を設定します。</p></div></div><div class="panel"><div class="form-grid"><div class="field"><label>予約受付日数</label><input id="bookingDays" class="control" type="number" min="1"></div><div class="field"><label>標準リード日数</label><input id="leadDays" class="control" type="number" min="0"></div><div class="field"><label>1日の製作ポイント上限</label><input id="dailyCapacity" class="control" type="number" min="1"></div><div class="field wide"><label>店舗からのお知らせ</label><textarea id="notice" class="control"></textarea></div></div><div class="product-actions"><button id="saveSettings" class="btn">設定を保存</button></div></div></section>
      </main>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="config.js"></script>
  <script>
  (()=>{"use strict";
    const C=window.DPRO_CAKE_CONFIG||{apiBase:"https://dpro-cake-line-api.dpromstk2000.workers.dev"};
    const $=id=>document.getElementById(id);let adminKey="",shop=null,settings=null,products=[],orders=[];
    const esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
    const money=v=>`¥${Number(v||0).toLocaleString("ja-JP")}`;const today=()=>new Intl.DateTimeFormat("sv-SE",{timeZone:"Asia/Tokyo"}).format(new Date());
    function toast(message,bad=false){const el=$("toast");el.textContent=message;el.style.background=bad?"#8e2633":"#263d2d";el.classList.remove("hidden");clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.add("hidden"),3500)}
    async function api(path,opt={}){const h={"Content-Type":"application/json",...(opt.headers||{})};if(adminKey)h["X-Admin-Key"]=adminKey;const r=await fetch(`${C.apiBase}${path}`,{...opt,headers:h});let d={};try{d=await r.json()}catch{}if(!r.ok)throw new Error(d.message||`通信エラー ${r.status}`);return d}
    async function login(){adminKey=$("adminCode").value.trim();if(!adminKey)return showLoginError("管理コードを入力してください。");try{await Promise.all([loadShop(),loadProducts(),loadDashboard()]);sessionStorage.setItem("cake_admin_key",adminKey);$("login").classList.add("hidden");$("app").classList.remove("hidden");$("apiStatus").textContent="API・DB 接続OK";renderProducts();loadSettingsForm()}catch(e){adminKey="";showLoginError(e.message)}}
    function showLoginError(m){$("loginMessage").textContent=m;$("loginMessage").classList.remove("hidden")}
    async function loadShop(){const d=await api("/api/shop");shop=d.shop;settings=d.settings;$("shopName").textContent=shop.shop_name||"DPRO パティスリー"}
    async function loadDashboard(){const d=await api("/api/admin/dashboard");const x=d.dashboard||{};$("metrics").innerHTML=[["本日の予約",x.today_orders??x.today_order_count??0],["製作中",x.preparing_orders??x.preparing_count??0],["受渡待ち",x.ready_orders??x.ready_count??0],["未対応",x.open_orders??x.active_order_count??0]].map(a=>`<div class="metric"><b>${esc(a[1])}</b><span>${a[0]}</span></div>`).join("");await loadOrders(true)}
    async function loadOrders(dashboard=false){const p=new URLSearchParams();if(dashboard){p.set("date_from",today());p.set("date_to",today())}else{if($("orderDate").value){p.set("date_from",$("orderDate").value);p.set("date_to",$("orderDate").value)}if($("orderStatus").value)p.set("status",$("orderStatus").value);if($("orderQuery").value.trim())p.set("q",$("orderQuery").value.trim())}const d=await api(`/api/admin/orders?${p}`);orders=d.orders||[];renderOrders(dashboard?$("todayOrders"):$("orderList"))}
    function renderOrders(root){root.innerHTML=orders.length?orders.map(o=>`<article class="order"><div class="order-top"><span>${esc(o.pickup_date)} ${esc(String(o.pickup_time||"").slice(0,5))}</span><span>${esc(statusLabel(o.order_status))}</span></div><div><strong>${esc(o.customer_name)}</strong>様　${esc(o.order_no)}</div><div class="order-meta">${esc(o.phone||"")}　${money(o.total_amount)}　商品${(o.cake_order_items||[]).length}点</div></article>`).join(""):`<div class="empty">該当する予約はありません。</div>`}
    function statusLabel(s){return({reserved:"予約受付",confirmed:"確認済み",preparing:"製作中",ready:"受渡準備完了",handed_over:"受渡済み",cancel_requested:"取消依頼",cancelled:"取消済み",no_show:"未受取"})[s]||s}
    async function loadProducts(){const d=await api("/api/admin/products");products=d.products||[]}
    function renderProducts(){$("productList").innerHTML=products.length?products.map(productCard).join(""):`<div class="panel empty">商品がありません。</div>`}
    function productCard(p){return `<article class="product" data-id="${esc(p.id)}"><div class="photo">${p.image_url?`<img src="${esc(p.image_url)}" alt="${esc(p.product_name)}">`:`<span class="photo-placeholder">🎂</span>`}<span class="photo-badge">${p.image_url?"登録済み":"写真未登録"}</span></div><div class="product-body"><div class="product-title"><h2>${esc(p.product_name)}</h2><div class="chips"><span class="chip ${p.is_active?"live":""}">${p.is_active?"公開":"非公開"}</span>${p.is_sold_out?'<span class="chip sold">売り切れ</span>':""}</div></div><div class="form-grid"><div class="field"><label>商品名</label><input class="control" data-f="product_name" value="${esc(p.product_name)}"></div><div class="field"><label>基本価格</label><input class="control" data-f="base_price" type="number" min="0" value="${esc(p.base_price)}"></div><div class="field"><label>表示順</label><input class="control" data-f="sort_order" type="number" min="0" value="${esc(p.sort_order)}"></div><div class="field wide"><label>商品説明</label><textarea class="control" data-f="description">${esc(p.description||"")}</textarea></div><div class="field wide"><label>アレルギー情報</label><input class="control" data-f="allergen_summary" value="${esc(p.allergen_summary||"")}"></div><div class="field"><label>予約リード日数</label><input class="control" data-f="lead_days" type="number" min="0" value="${esc(p.lead_days)}"></div><div class="field"><label>販売開始日</label><input class="control" data-f="sales_start_date" type="date" value="${esc(p.sales_start_date||"")}"></div><div class="field"><label>販売終了日</label><input class="control" data-f="sales_end_date" type="date" value="${esc(p.sales_end_date||"")}"></div></div><div class="checks"><label class="check"><input data-f="is_active" type="checkbox" ${p.is_active?"checked":""}>お客様画面に公開</label><label class="check"><input data-f="is_sold_out" type="checkbox" ${p.is_sold_out?"checked":""}>売り切れ</label><label class="check"><input data-f="is_featured" type="checkbox" ${p.is_featured?"checked":""}>おすすめ表示</label></div><div class="product-actions"><button class="btn" data-action="save">商品情報を保存</button><label class="btn secondary" tabindex="0">${p.image_url?"写真を差し替え":"写真を登録"}<input class="file" data-action="photo" type="file" accept="image/jpeg,image/png,image/webp"></label>${p.image_url?'<button class="btn danger" data-action="delete-photo">写真を削除</button>':""}</div></div></article>`}
    function getCard(el){return el.closest(".product")}
    async function saveProduct(card){const body={};card.querySelectorAll("[data-f]").forEach(el=>body[el.dataset.f]=el.type==="checkbox"?el.checked:el.type==="number"?Number(el.value):el.value||null);try{await api(`/api/admin/products/${encodeURIComponent(card.dataset.id)}`,{method:"PATCH",body:JSON.stringify(body)});toast("商品情報を保存しました。");await loadProducts();renderProducts()}catch(e){toast(e.message,true)}}
    function resizeImage(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onerror=reject;reader.onload=()=>{const img=new Image();img.onerror=reject;img.onload=()=>{const max=1600,scale=Math.min(1,max/Math.max(img.width,img.height)),canvas=document.createElement("canvas");canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);resolve({base64:canvas.toDataURL("image/jpeg",.86),mime_type:"image/jpeg",original_filename:file.name})};img.src=reader.result};reader.readAsDataURL(file)})}
    async function uploadPhoto(card,file){if(!file)return;try{toast("写真を処理しています…");const payload=await resizeImage(file);await api(`/api/admin/products/${encodeURIComponent(card.dataset.id)}/photo`,{method:"POST",body:JSON.stringify(payload)});toast("商品写真を登録しました。");await loadProducts();renderProducts()}catch(e){toast(e.message,true)}}
    async function deletePhoto(card){if(!confirm("この商品の写真を削除しますか？"))return;try{await api(`/api/admin/products/${encodeURIComponent(card.dataset.id)}/photo`,{method:"DELETE"});toast("商品写真を削除しました。");await loadProducts();renderProducts()}catch(e){toast(e.message,true)}}
    function loadSettingsForm(){$("bookingDays").value=settings?.booking_open_days??60;$("leadDays").value=settings?.standard_lead_days??2;$("dailyCapacity").value=settings?.default_daily_capacity_points??30;$("notice").value=settings?.notice||""}
    async function saveSettings(){try{const d=await api("/api/admin/settings",{method:"PATCH",body:JSON.stringify({booking_open_days:Number($("bookingDays").value),standard_lead_days:Number($("leadDays").value),default_daily_capacity_points:Number($("dailyCapacity").value),notice:$("notice").value})});settings=d.settings;toast("予約設定を保存しました。")}catch(e){toast(e.message,true)}}
    async function reload(){try{await Promise.all([loadShop(),loadProducts(),loadDashboard()]);renderProducts();loadSettingsForm();toast("最新情報に更新しました。")}catch(e){toast(e.message,true)}}
    document.addEventListener("click",e=>{const nav=e.target.closest(".nav");if(nav){document.querySelectorAll(".nav").forEach(x=>x.classList.toggle("active",x===nav));document.querySelectorAll(".view").forEach(x=>x.classList.toggle("hidden",x.id!==`view-${nav.dataset.view}`));if(nav.dataset.view==="orders")loadOrders(false).catch(x=>toast(x.message,true))}const a=e.target.closest("[data-action]");if(a){const card=getCard(a);if(a.dataset.action==="save")saveProduct(card);if(a.dataset.action==="delete-photo")deletePhoto(card)}});
    document.addEventListener("change",e=>{if(e.target.dataset.action==="photo")uploadPhoto(getCard(e.target),e.target.files[0])});
    $("loginButton").onclick=login;$("adminCode").onkeydown=e=>{if(e.key==="Enter")login()};$("clearCode").onclick=()=>{$("adminCode").value="";$("adminCode").focus()};$("logout").onclick=()=>{sessionStorage.removeItem("cake_admin_key");location.reload()};$("searchOrders").onclick=()=>loadOrders(false).catch(e=>toast(e.message,true));$("saveSettings").onclick=saveSettings;document.querySelectorAll("[data-reload]").forEach(b=>b.onclick=reload);
    const saved=sessionStorage.getItem("cake_admin_key");if(saved){$("adminCode").value=saved;login()}else if(new URLSearchParams(location.search).get("demo")==="1"){$("adminCode").value="1234";login()}
  })();
  </script>
</body>
</html>
