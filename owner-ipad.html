<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#7f2541"><title>DPRO パティスリー｜当日受渡し</title>
<style>
:root{--bg:#f8f1e9;--paper:#fffdfa;--ink:#3e2924;--muted:#786860;--line:#e8d8ca;--berry:#ad3158;--berry2:#7f2541;--cocoa:#613b34;--green:#397154;--amber:#9b651c;--red:#a52f3d;--shadow:0 10px 28px #5b382014}*{box-sizing:border-box}html{font-size:17px}body{margin:0;background:linear-gradient(145deg,#faf6ef,#f7ecec);color:var(--ink);font:17px/1.65 system-ui,-apple-system,"Segoe UI",sans-serif}button,input{font:inherit;font-size:17px}.hidden{display:none!important}.top{position:sticky;top:0;z-index:20;background:#fffdfaf2;backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.topin{max-width:1220px;min-height:72px;margin:auto;padding:9px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:11px}.mark{width:46px;height:46px;border-radius:14px;background:var(--berry);color:#fff;display:grid;place-items:center;font-size:23px}.brand strong{font-size:20px}.small{font-size:14px;color:var(--muted)}.links{display:flex;gap:8px;align-items:center}.btn{min-height:50px;border:0;border-radius:12px;padding:9px 17px;background:var(--berry);color:#fff;font-weight:850;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn:hover{background:var(--berry2)}.btn.sub{background:#eee2d8;color:var(--cocoa)}.btn.green{background:var(--green)}.btn.warn{background:#fff0d9;color:#7d4c0a;border:1px solid #dfbd82}.btn.danger{background:#fff0f1;color:var(--red);border:1px solid #e5afb7}.wrap{max-width:1220px;margin:auto;padding:20px 18px 80px}.auth,.panel,.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.auth{max-width:620px;margin:55px auto;padding:25px}.auth h1{font-size:27px;margin:0 0 8px}.fieldrow{display:grid;grid-template-columns:1fr auto auto;gap:9px;margin-top:16px}input,select{min-height:50px;border:1px solid #d8c5b7;border-radius:11px;background:#fff;padding:9px 12px;color:var(--ink)}.hero{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:15px}.hero h1{font-size:28px;line-height:1.35;margin:0}.datebar{display:flex;gap:9px;align-items:center}.datebar input{width:190px}.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:14px 0}.metric{padding:14px;background:var(--paper);border:1px solid var(--line);border-radius:15px}.metric b{display:block;font-size:25px;line-height:1.2}.metric.attn{background:#fff0f1;border-color:#e5afb7}.tools{display:grid;grid-template-columns:1fr auto;gap:10px;padding:14px;margin-bottom:14px}.filters{display:flex;gap:8px;flex-wrap:wrap}.chip{min-height:46px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:800;cursor:pointer}.chip.active{background:var(--cocoa);color:#fff;border-color:var(--cocoa)}.orders{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.card{overflow:hidden}.head{display:flex;justify-content:space-between;gap:10px;background:#f6ebe4;padding:14px 16px}.time{font-size:24px;font-weight:950}.status{align-self:start;border-radius:999px;padding:5px 10px;background:#e7f2e9;color:#356445;font-size:14px;font-weight:850}.status.attn{background:#ffe5e8;color:#8c2936}.body{padding:16px}.name{font-size:21px;font-weight:900}.meta{font-size:14px;color:var(--muted)}.items{margin:12px 0;border-top:1px solid var(--line)}.item{padding:10px 0;border-bottom:1px solid var(--line)}.item strong{display:block}.alert{margin:10px 0;padding:10px 12px;border-radius:11px;background:#fff0d9;color:#734407;font-weight:750}.alert.red{background:#ffe7e9;color:#8c2936}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}.actions .btn{flex:1;min-width:145px}.empty{text-align:center;padding:55px 18px;background:var(--paper);border:1px solid var(--line);border-radius:18px;color:var(--muted)}.notice{padding:12px 14px;border-radius:12px;background:#fff0d9;color:#75470a;margin-bottom:13px}.notice.error{background:#ffe7e9;color:#8c2936}.toast{position:fixed;right:18px;bottom:18px;z-index:50;max-width:420px;background:#294534;color:#fff;padding:14px 18px;border-radius:12px;box-shadow:var(--shadow)}
@media(max-width:850px){.orders{grid-template-columns:1fr}.summary{grid-template-columns:repeat(3,1fr)}.links a:first-child{display:none}}@media(max-width:600px){.wrap{padding:14px 12px 70px}.topin{padding:8px 12px}.hero{align-items:stretch;flex-direction:column}.datebar input{width:100%}.summary{grid-template-columns:repeat(2,1fr)}.tools{grid-template-columns:1fr}.fieldrow{grid-template-columns:1fr auto}.fieldrow .btn:first-of-type{grid-column:1/-1}.actions .btn{min-width:100%}}
</style></head><body>
<header class="top"><div class="topin"><div class="brand"><div class="mark">♛</div><div><strong id="shopName">DPRO パティスリー</strong><div class="small">スタッフ用・製作受渡し</div></div></div><div class="links"><a class="btn sub" href="owner.html?demo=1">PC管理画面</a><a class="btn sub" href="index.html?demo=1">お客様画面</a><button id="logout" class="btn danger hidden">ログアウト</button></div></div></header>
<main class="wrap"><section id="auth" class="auth"><h1>スタッフ画面を開く</h1><p>管理コードを入力してください。デモURLでは自動入力されます。</p><div class="fieldrow"><input id="adminCode" inputmode="numeric" autocomplete="off" placeholder="管理コード"><button id="login" class="btn">開く</button><button id="clearCode" class="btn sub">削除</button></div><div id="authMsg" class="notice error hidden"></div></section>
<section id="app" class="hidden"><div class="hero"><div><h1 id="pageTitle">本日の製作・受渡し</h1><div id="pageGuide" class="small">予約内容を確認し、進行状態を更新します。</div></div><div class="datebar"><input id="targetDate" type="date"><button id="reload" class="btn sub">再読込</button></div></div><div id="message" class="notice hidden"></div><div id="summary" class="summary"></div><section class="panel tools"><input id="search" placeholder="予約番号・氏名・電話番号で検索"><div id="filters" class="filters"><button class="chip active" data-filter="active">進行中</button><button class="chip" data-filter="ready">受取待ち</button><button class="chip" data-filter="attention">要確認</button><button class="chip" data-filter="all">すべて</button></div></section><section id="orders" class="orders"></section></section></main><div id="toast" class="toast hidden"></div>
<script src="config.js"></script><script>
(()=>{"use strict";const C=window.DPRO_CAKE_CONFIG||{apiBase:"https://dpro-cake-line-api.dpromstk2000.workers.dev"},$=id=>document.getElementById(id);let key="",orders=[],filter="active";const esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])),yen=v=>`¥${Number(v||0).toLocaleString("ja-JP")}`,jst=()=>new Intl.DateTimeFormat("sv-SE",{timeZone:"Asia/Tokyo"}).format(new Date()),tm=v=>String(v||"").slice(0,5);
async function api(path,opt={}){const sep=path.includes("?")?"&":"?",r=await fetch(C.apiBase+path+sep+"admin_key="+encodeURIComponent(key),{...opt,headers:{"Content-Type":"application/json",...(opt.headers||{})}});let d={};try{d=await r.json()}catch{}if(!r.ok)throw Error(d.message||`通信エラー ${r.status}`);return d}function toast(m,b=false){const e=$("toast");e.textContent=m;e.style.background=b?"#8c2936":"#294534";e.classList.remove("hidden");clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.add("hidden"),3200)}function statusLabel(s){return({reserved:"予約受付",confirmed:"確認済み",preparing:"製作中",ready:"受取準備完了",handed_over:"受渡し済み",cancel_requested:"取消依頼",cancelled:"取消済み",no_show:"未受取"})[s]||s}function nextAction(o){return o.order_status==="reserved"?["confirmed","予約を確認"]:o.order_status==="confirmed"?["preparing","製作を開始"]:o.order_status==="preparing"?["ready","受取準備完了"]:o.order_status==="ready"?["handed_over","受渡し完了"]:o.order_status==="cancel_requested"?["cancelled","取消を確定"]:null}
async function login(){key=$("adminCode").value.trim();if(!key)return showAuth("管理コードを入力してください。");try{const d=await api("/api/shop");$("shopName").textContent=d.shop?.shop_name||"DPRO パティスリー";sessionStorage.setItem("cake_admin_key",key);$("auth").classList.add("hidden");$("app").classList.remove("hidden");$("logout").classList.remove("hidden");await load()}catch(e){showAuth(e.message)}}function showAuth(m){$("authMsg").textContent=m;$("authMsg").classList.remove("hidden")}
function isPast(){return $("targetDate").value<jst()}function updateDateMode(){const past=isPast(),date=$("targetDate").value;$("pageTitle").textContent=past?"過去の予約履歴":date===jst()?"本日の製作・受渡し":"予約日の製作・受渡し";$("pageGuide").textContent=past?"過去日のため閲覧専用です。状態の変更はできません。":"予約内容を確認し、進行状態を更新します。";if(past){$("message").textContent="この日は過去の予約履歴です。誤操作防止のため、状態更新ボタンを停止しています。";$("message").className="notice"}else{$("message").classList.add("hidden")}}
async function load(){try{updateDateMode();const date=$("targetDate").value;const d=await api(`/api/admin/orders?date_from=${date}&date_to=${date}`);orders=d.orders||[];render()}catch(e){$("message").textContent=e.message;$("message").className="notice error"}}
function visible(){const q=$("search").value.trim().replace(/[-\sー－]/g,"").toLowerCase();return orders.filter(o=>{if(q&&!`${o.order_no} ${o.customer_name} ${String(o.phone||"").replace(/[-\sー－]/g,"")}`.toLowerCase().includes(q))return false;if(filter==="active")return ["reserved","confirmed","preparing","ready","cancel_requested"].includes(o.order_status);if(filter==="ready")return o.order_status==="ready";if(filter==="attention")return o.order_status==="cancel_requested"||Boolean(o.allergy_notes);return true})}
function render(){const counts=s=>orders.filter(o=>s.includes(o.order_status)).length;$("summary").innerHTML=`<div class="metric"><span>選択日の予約</span><b>${orders.length}</b></div><div class="metric"><span>確認待ち</span><b>${counts(["reserved"])}</b></div><div class="metric"><span>製作中</span><b>${counts(["preparing"])}</b></div><div class="metric"><span>受取待ち</span><b>${counts(["ready"])}</b></div><div class="metric attn"><span>取消依頼</span><b>${counts(["cancel_requested"])}</b></div>`;const list=visible();$("orders").innerHTML=list.length?list.map(card).join(""):'<div class="empty">該当する予約はありません。</div>';document.querySelectorAll("[data-next]").forEach(b=>b.onclick=()=>change(b.dataset.order,b.dataset.next));document.querySelectorAll("[data-detail]").forEach(b=>b.onclick=()=>location.href=`owner.html?demo=1&order=${encodeURIComponent(b.dataset.detail)}`)}
function card(o){const past=isPast(),n=past?null:nextAction(o),att=o.order_status==="cancel_requested";return `<article class="card"><div class="head"><div><div class="time">${tm(o.pickup_time)} 受取</div><div class="meta">${esc(o.order_no)}</div></div><span class="status ${att?"attn":""}">${esc(statusLabel(o.order_status))}</span></div><div class="body"><div class="name">${esc(o.customer_name)} 様</div><div class="meta">${esc(o.phone||"")}／${esc(o.reception_type||"line")}</div>${o.allergy_notes?`<div class="alert red">アレルギー注意：${esc(o.allergy_notes)}</div>`:""}${att?'<div class="alert red">お客様からキャンセル依頼があります。</div>':""}<div class="items">${(o.cake_order_items||[]).map(i=>`<div class="item"><strong>${esc(i.product_name)}</strong><span>${esc(i.variant_name||"")} × ${i.quantity}　${yen(i.line_total)}</span>${i.message_plate_text?`<div class="meta">プレート：${esc(i.message_plate_text)}</div>`:""}${i.candle_note?`<div class="meta">ろうそく：${esc(i.candle_note)}</div>`:""}</div>`).join("")}</div><div><strong>合計 ${yen(o.total_amount)}</strong></div>${o.customer_note?`<div class="alert">ご希望：${esc(o.customer_note)}</div>`:""}${past?'<div class="alert">過去日のため履歴閲覧のみです。</div>':""}<div class="actions">${n?`<button class="btn ${n[0]==="handed_over"?"green":n[0]==="cancelled"?"danger":""}" data-order="${esc(o.order_no)}" data-next="${n[0]}">${n[1]}</button>`:""}<button class="btn sub" data-detail="${esc(o.order_no)}">PCで詳細</button></div></div></article>`}
async function change(no,next){if(isPast()){toast("過去日の予約は変更できません。",true);return}const labels={confirmed:"予約確認",preparing:"製作開始",ready:"受取準備完了",handed_over:"受渡し完了",cancelled:"キャンセル確定"};if(!confirm(`${no} を「${labels[next]}」に更新しますか？`))return;try{await api(`/api/admin/orders/${encodeURIComponent(no)}/status`,{method:"PATCH",body:JSON.stringify({status:next,changed_by:"owner-ipad"})});toast("状態を更新しました。");await load()}catch(e){toast(e.message,true)}}
$("targetDate").value=jst();$("login").onclick=login;$("clearCode").onclick=()=>{$("adminCode").value="";$("adminCode").focus()};$("reload").onclick=load;$("targetDate").onchange=load;$("search").oninput=render;document.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("active",x===b));render()});$("logout").onclick=()=>{sessionStorage.removeItem("cake_admin_key");location.reload()};const q=new URLSearchParams(location.search),saved=sessionStorage.getItem("cake_admin_key");if(q.get("demo")==="1"){$("adminCode").value="1234";login()}else if(saved){$("adminCode").value=saved;login()}
})();</script></body></html>
