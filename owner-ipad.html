<style>

90px}.auth{max-width:620px;margin:65px auto;background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:30px;box-shadow:var(--shadow)}.auth h1{font-size:29px;margin:0}.authgrid{display:grid;grid-template-columns:1fr auto auto;gap:10px;margin-top:18px}.control{width:100%;min-height:52px;border:1px solid #d8c4b7;border-radius:12px;background:#fff;padding:10px 13px;color:var(--ink)}.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:14px}.hero h1{font-size:30px;line-height:1.3;margin:0}.datecontrols{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.datebox{position:relative;min-width:220px;min-height:52px;border:1px solid #d8c4b7;border-radius:13px;background:#fff;padding:6px 46px 6px 13px;display:flex;align-items:center}.datebox strong{font-size:16px}.datebox input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}.datebox::after{content:"▣";position:absolute;right:14px;color:var(--berry)}.notice{margin-bottom:13px;padding:12px 14px;border-radius:12px;background:var(--amberp);color:#724508}.notice.error{background:var(--redp);color:#8b2936}.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}.metric{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:0 7px 19px rgba(75,46,43,.05)}.metric b{display:block;font-size:28px;line-height:1.2;margin-top:3px}.metric.attn{background:var(--redp);border-color:#e6b0b8}.metric.ready{background:var(--greenp);border-color:#b8d9c1}.metric.work{background:var(--bluep);border-color:#bdd8e6}.tabs{display:flex;gap:8px;overflow:auto;padding:3px 0 12px}.tab{min-height:50px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--ink);padding:9px 18px;font-weight:850;white-space:nowrap;cursor:pointer}.tab.active{background:var(--cocoa);color:#fff;border-color:var(--cocoa)}.toolbar{display:grid;grid-template-columns:minmax(240px,1fr) auto;gap:12px;background:var(--paper);border:1px solid var(--line);border-radius:17px;padding:14px;margin-bottom:14px}.filters{display:flex;gap:7px;flex-wrap:wrap}.chip{min-height:46px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:15px;font-weight:800;cursor:pointer}.chip.active{background:var(--berry);color:#fff;border-color:var(--berry)}.section{margin-bottom:18px}.sectionhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:5px 0 10px}.sectionhead h2{font-size:23px;margin:0}.count{display:inline-grid;place-items:center;min-width:33px;height:33px;border-radius:999px;background:var(--berryp);color:var(--berry2);font-weight:900}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.card.urgent{border:2px solid var(--red)}.cardhead{display:flex;justify-content:space-between;gap:12px;padding:14px 16px;background:#f6ebe4}.time{font-size:26px;line-height:1.2;font-weight:950}.orderno{font-size:14px;color:var(--muted)}.badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;align-content:flex-start}.badge{display:inline-flex;align-items:center;min-height:30px;padding:4px 9px;border-radius:999px;background:#eee7e1;color:var(--cocoa);font-size:13px;font-weight:850}.badge.reserved{background:var(--amberp);color:var(--amber)}.badge.confirmed{background:var(--bluep);color:var(--blue)}.badge.preparing{background:var(--purplep);color:var(--purple)}.badge.ready{background:var(--greenp);color:var(--green)}.badge.handed_over{background:#eee8e4;color:#6b5d58}.badge.attn,.badge.unpaid{background:var(--redp);color:var(--red)}.badge.paid{background:var(--greenp);color:var(--green)}.cardbody{padding:16px}.customer{font-size:22px;font-weight:900}.meta{font-size:14px;color:var(--muted)}.itemlist{margin-top:12px;border-top:1px solid var(--line)}.item{padding:11px 0;border-bottom:1px solid var(--line)}.itemtop{display:flex;justify-content:space-between;gap:10px}.item strong{font-size:17px}.qty{font-weight:900;color:var(--berry2)}.spec{font-size:14px;color:var(--muted);margin-top:3px}.alert{margin-top:10px;padding:10px 12px;border-radius:11px;background:var(--amberp);color:#754608;font-weight:750}.alert.red{background:var(--redp);color:#8b2936}.alert.blue{background:var(--bluep);color:#345f7b}.totalrow{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-weight:850}.cardactions{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(120px,.7fr);gap:9px;margin-top:14px}.cardactions .btn{width:100%;min-height:58px;font-size:17px}.empty{grid-column:1/-1;text-align:center;padding:58px 18px;background:var(--paper);border:1px solid var(--line);border-radius:18px;color:var(--muted)}.timegroups,.productgroups{display:grid;gap:12px}.group{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:17px;box-shadow:var(--shadow)}.grouptop{display:flex;justify-content:space-between;align-items:center;gap:12px}.grouptop h3{font-size:23px;margin:0}.groupgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}.groupstat{background:#faf5ef;border:1px solid var(--line);border-radius:12px;padding:10px}.aggregate{margin-top:12px;display:grid;gap:8px}.aggrow{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;border-top:1px solid var(--line);padding-top:9px}.aggrow b:last-child{font-size:20px;color:var(--berry2)}.modalback{position:fixed;inset:0;z-index:80;background:rgba(49,31,28,.55);display:grid;place-items:center;padding:18px}.modal{width:min(850px,100%);max-height:92vh;overflow:auto;background:var(--paper);border-radius:22px;box-shadow:0 25px 80px rgba(40,25,23,.28)}.modalhead{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--cocoa);color:#fff;padding:16px 19px}.modalhead h2{margin:0;font-size:23px}.close{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-size:25px;cursor:pointer}.modalbody{padding:19px}.detailgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.detailbox{border:1px solid var(--line);border-radius:13px;background:#fff;padding:12px}.detailbox.full{grid-column:1/-1}.detailitems{display:grid;gap:10px;margin-top:14px}.detailitem{border:1px solid var(--line);border-radius:14px;background:#fff;padding:13px}.optionline{font-size:14px;color:var(--muted);padding:3px 0}.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}.photo{aspect-ratio:4/3;border-radius:13px;overflow:hidden;background:#f3e8e4;display:grid;place-items:center}.photo img{width:100%;height:100%;object-fit:cover}.modalactions{display:flex;gap:9px;flex-wrap:wrap;margin-top:17px}.modalactions .btn{flex:1;min-width:180px}.paymentbox{text-align:center}.paymentamount{font-size:38px;font-weight:950;color:var(--berry2);margin:8px 0}.checkline{display:flex;align-items:flex-start;gap:10px;text-align:left;border:1px solid var(--line);border-radius:13px;background:#fff;padding:13px;margin-top:13px}.checkline input{width:24px;height:24px;flex:0 0 24px}.toast{position:fixed;right:20px;bottom:20px;z-index:110;max-width:440px;padding:14px 18px;border-radius:13px;background:#294534;color:#fff;box-shadow:var(--shadow)}
@media(max-width:1100px){.summary{grid-template-columns:repeat(3,1fr)}.cards{grid-template-columns:1fr}.groupgrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.topin{padding:8px 12px}.toplinks a,.apiok{display:none}.wrap{padding:14px 12px 80px}.hero{align-items:stretch;flex-direction:column}.datecontrols{display:grid;grid-template-columns:repeat(3,1fr)}.datebox{grid-column:1/-1;min-width:0}.summary{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}.cardactions{grid-template-columns:1fr}.groupgrid{grid-template-columns:1fr}.detailgrid{grid-template-columns:1fr}.detailbox.full{grid-column:auto}.photos{grid-template-columns:repeat(2,1fr)}.authgrid{grid-template-columns:1fr 1fr}.authgrid .btn:first-of-type{grid-column:1/-1}.modalback{padding:8px}.modal{max-height:96vh}}
@media(max-width:430px){.datecontrols{grid-template-columns:1fr 1fr}.datebox{grid-column:1/-1}.summary{grid-template-columns:1fr 1fr}.metric{padding:12px}.metric b{font-size:24px}.photos{grid-template-columns:1fr}.toplinks .btn{padding:8px 11px}.brand strong{font-size:18px}}

<body>
<header class="top"><div class="topin"><div class="brand"><div class="mark">♛</div><div><strong id="shopName">DPRO パティスリー</strong><div class="small">スタッフiPad｜製作・受渡し</div></div></div><div class="toplinks"><span class="apiok">API・DB 接続OK</span><a class="btn sub" data-demo-link data-path="owner.html" href="owner.html">PC管理</a><a class="btn sub" data-demo-link data-path="index.html" href="index.html">お客様画面</a><button id="logout" class="btn danger hidden">ログアウト</button></div></div></header>
<main class="wrap">
<section id="auth" class="auth"><h1>スタッフ画面を開く</h1><p>管理コードを入力してください。デモURLでは自動入力されます。</p><div class="authgrid"><input id="adminCode" class="control" inputmode="numeric" autocomplete="off" placeholder="管理コード"><button id="login" class="btn">開く</button><button id="clearCode" class="btn sub">削除</button></div><div id="authMsg" class="notice error hidden" style="margin-top:14px"></div></section>
<section id="app" class="hidden">
<div class="hero"><div><h1 id="pageTitle">本日の製作・受渡し</h1><div id="pageGuide" class="small">予約内容を確認し、製作から受渡しまで更新します。</div></div><div class="datecontrols"><button id="prevDate" class="btn sub">‹ 前日</button><button id="todayDate" class="btn sub">今日</button><button id="nextDate" class="btn sub">翌日 ›</button><div class="datebox"><strong id="targetDateDisplay">日付を選択</strong><input id="targetDate" type="date" aria-label="対象日"></div><button id="reload" class="btn ghost">再読込</button></div></div>
<div id="message" class="notice hidden"></div><div id="summary" class="summary"></div>
<div class="tabs"><button class="tab active" data-view="workflow">製作ボード</button><button class="tab" data-view="time">受取時間順</button><button class="tab" data-view="product">商品別集計</button></div>
<section id="workflowView" class="view"><div class="toolbar"><input id="search" class="control" placeholder="予約番号・氏名・電話・商品名で検索"><div id="filters" class="filters"><button class="chip active" data-filter="active">進行中</button><button class="chip" data-filter="reserved">確認待ち</button><button class="chip" data-filter="preparing">製作中</button><button class="chip" data-filter="ready">受取待ち</button><button class="chip" data-filter="attention">要確認</button><button class="chip" data-filter="all">すべて</button></div></div><div id="workflow"></div></section>
<section id="timeView" class="view hidden"><div id="timeGroups" class="timegroups"></div></section>
<section id="productView" class="view hidden"><div id="productGroups" class="productgroups"></div></section>
</section>
</main>
<div id="detailModal" class="modalback hidden" role="dialog" aria-modal="true"><div class="modal"><div class="modalhead"><h2 id="detailTitle">予約詳細</h2><button id="closeDetail" class="close" aria-label="閉じる">×</button></div><div id="detailBody" class="modalbody"></div></div></div>
<div id="paymentModal" class="modalback hidden" role="dialog" aria-modal="true"><div class="modal" style="width:min(560px,100%)"><div class="modalhead"><h2>支払い・受渡し確認</h2><button id="closePayment" class="close" aria-label="閉じる">×</button></div><div class="modalbody paymentbox"><div id="paymentOrder" class="small"></div><div id="paymentAmount" class="paymentamount">¥0</div><div id="paymentMethod" class="badge"></div><label class="checkline"><input id="paymentAck" type="checkbox"><span><strong>支払いを確認しました</strong><br><span class="small">確認後、支払い済みを保存して受渡完了へ更新します。</span></span></label><div class="modalactions"><button id="confirmPayment" class="btn green" disabled>支払い確認・受渡完了</button><button id="cancelPayment" class="btn sub">戻る</button></div></div></div></div>
<div id="toast" class="toast hidden"></div>
<script src="config.js"></script>
<script>
(()=>{"use strict";
const VERSION="CAKE-15-STAFF-IPAD-WORKFLOW-20260721";
const C=window.DPRO_CAKE_CONFIG||{apiBase:"https://dpro-cake-line-api.dpromstk2000.workers.dev"};
const $=id=>document.getElementById(id);let key="",orders=[],filter="active",view="workflow",detailOrder=null,paymentOrder=null,loading=false;
const esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
const yen=v=>`¥${Number(v||0).toLocaleString("ja-JP")}`;const tm=v=>String(v||"").slice(0,5);const jst=()=>new Intl.DateTimeFormat("sv-SE",{timeZone:"Asia/Tokyo"}).format(new Date());
const formatDate=v=>{if(!v)return"日付未選択";const d=new Date(`${v}T12:00:00Z`);return new Intl.DateTimeFormat("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short",timeZone:"UTC"}).format(d)};
const addDays=(v,n)=>{const d=new Date(`${v}T12:00:00Z`);d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10)};
async function api(path,opt={}){const sep=path.includes("?")?"&":"?";const r=await fetch(C.apiBase+path+sep+"admin_key="+encodeURIComponent(key),{...opt,headers:{"Content-Type":"application/json",...(opt.headers||{})}});let d={};try{d=await r.json()}catch{}if(!r.ok){const e=new Error(d.message||`通信エラー ${r.status}`);e.code=d.error;throw e}return d}
function toast(m,b=false){const e=$("toast");e.textContent=m;e.style.background=b?"#8c2936":"#294534";e.classList.remove("hidden");clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.add("hidden"),3400)}
function statusLabel(s){return({reserved:"予約受付",confirmed:"製作待ち",preparing:"製作中",ready:"受取可能",handed_over:"受渡済み",cancel_requested:"取消依頼",cancelled:"取消済み",no_show:"未受取"})[s]||s}
function paymentLabel(s){return s==="paid"?"支払い済み":"未払い"}function methodLabel(s){return({pay_at_store:"店頭支払い",prepaid:"事前決済",other:"その他"})[s]||s||"店頭支払い"}
function nextAction(o){return o.order_status==="reserved"?["confirmed","予約内容を確認"]:o.order_status==="confirmed"?["preparing","製作を開始"]:o.order_status==="preparing"?["ready","完成・受取可能"]:o.order_status==="ready"?["handed_over",o.payment_status==="paid"?"受渡し完了":"支払い確認・受渡し"]:o.order_status==="cancel_requested"?["cancelled","取消を確定"]:null}
function isPast(){return $("targetDate").value<jst()}
function updateDateMode(){const date=$("targetDate").value,past=isPast();$("targetDateDisplay").textContent=formatDate(date);$("pageTitle").textContent=past?"過去の予約履歴":date===jst()?"本日の製作・受渡し":"予約日の製作・受渡し";$("pageGuide").textContent=past?"過去日のため閲覧専用です。状態と支払いの変更はできません。":"予約内容を確認し、製作から受渡しまで更新します。";if(past){$("message").textContent="過去日のため、誤操作防止で更新ボタンを停止しています。";$("message").className="notice"}else $("message").classList.add("hidden")}
async function login(){key=$("adminCode").value.trim();if(!key)return showAuth("管理コードを入力してください。");try{const d=await api("/api/shop");$("shopName").textContent=d.shop?.shop_name||"DPRO パティスリー";sessionStorage.setItem("cake_admin_key",key);$("auth").classList.add("hidden");$("app").classList.remove("hidden");$("logout").classList.remove("hidden");await load()}catch(e){showAuth(e.message)}}
function showAuth(m){$("authMsg").textContent=m;$("authMsg").classList.remove("hidden")}
async function load(){if(loading)return;loading=true;try{updateDateMode();const date=$("targetDate").value;const d=await api(`/api/admin/orders?date_from=${date}&date_to=${date}`);orders=d.orders||[];renderAll()}catch(e){$("message").textContent=e.message;$("message").className="notice error"}finally{loading=false}}
function orderSearchText(o){return `${o.order_no} ${o.customer_name} ${o.phone||""} ${tm(o.pickup_time)} ${(o.cake_order_items||[]).map(i=>`${i.product_name} ${i.variant_name||""}`).join(" ")}`.replace(/[-\sー－]/g,"").toLowerCase()}
function visible(){const q=$("search").value.trim().replace(/[-\sー－]/g,"").toLowerCase();return orders.filter(o=>{if(q&&!orderSearchText(o).includes(q))return false;if(filter==="active")return["reserved","confirmed","preparing","ready","cancel_requested"].includes(o.order_status);if(filter==="attention")return o.order_status==="cancel_requested"||Boolean(o.allergy_notes)||o.payment_status!=="paid"&&o.order_status==="ready";if(filter==="reserved")return o.order_status==="reserved";if(filter==="preparing")return o.order_status==="preparing";if(filter==="ready")return o.order_status==="ready";return true})}
function renderSummary(){const c=s=>orders.filter(o=>s.includes(o.order_status)).length;const allergy=orders.filter(o=>String(o.allergy_notes||"").trim()).length;$("summary").innerHTML=`<div class="metric"><span>予約</span><b>${orders.length}</b></div><div class="metric"><span>確認待ち</span><b>${c(["reserved"])}</b></div><div class="metric"><span>製作待ち</span><b>${c(["confirmed"])}</b></div><div class="metric work"><span>製作中</span><b>${c(["preparing"])}</b></div><div class="metric ready"><span>受取待ち</span><b>${c(["ready"])}</b></div><div class="metric attn"><span>要注意</span><b>${c(["cancel_requested"])+allergy}</b></div>`}
function quickSpecs(i){return[i.message_plate_text?`プレート：${esc(i.message_plate_text)}`:"",i.candle_note?`ろうそく：${esc(i.candle_note)}`:"",i.decoration_note?`装飾：${esc(i.decoration_note)}`:"",i.wrapping_note?`包装：${esc(i.wrapping_note)}`:"",i.item_note?`商品希望：${esc(i.item_note)}`:""].filter(Boolean).join("<br>")}
function card(o){const past=isPast(),n=past?null:nextAction(o),att=o.order_status==="cancel_requested"||Boolean(o.allergy_notes);const items=o.cake_order_items||[];return `<article class="card ${att?"urgent":""}"><div class="cardhead"><div><div class="time">${tm(o.pickup_time)} 受取</div><div class="orderno">${esc(o.order_no)}</div></div><div class="badges"><span class="badge ${esc(o.order_status)}">${esc(statusLabel(o.order_status))}</span><span class="badge ${o.payment_status==="paid"?"paid":"unpaid"}">${paymentLabel(o.payment_status)}</span>${att?'<span class="badge attn">要確認</span>':""}</div></div><div class="cardbody"><div class="customer">${esc(o.customer_name)} 様</div><div class="meta">${esc(o.phone||"")}／${esc(methodLabel(o.payment_method))}</div>${o.allergy_notes?`<div class="alert red">⚠ アレルギー：${esc(o.allergy_notes)}</div>`:""}${o.order_status==="cancel_requested"?'<div class="alert red">お客様から取消依頼があります。</div>':""}<div class="itemlist">${items.map(i=>`<div class="item"><div class="itemtop"><strong>${esc(i.product_name)}</strong><span class="qty">× ${Number(i.quantity||0)}</span></div><div class="spec">${esc(i.variant_name||"")}${quickSpecs(i)?`<br>${quickSpecs(i)}`:""}</div></div>`).join("")||'<div class="item">商品明細を確認できません。</div>'}</div>${o.customer_note?`<div class="alert">お客様希望：${esc(o.customer_note)}</div>`:""}<div class="totalrow"><span>合計</span><strong>${yen(o.total_amount)}</strong></div>${past?'<div class="alert blue">過去日のため閲覧のみです。</div>':""}<div class="cardactions">${n?`<button class="btn ${n[0]==="handed_over"?"green":n[0]==="cancelled"?"danger":n[0]==="ready"?"purple":""}" data-order="${esc(o.order_no)}" data-next="${n[0]}">${n[1]}</button>`:"<button class=\"btn sub\" disabled>更新完了</button>"}<button class="btn sub" data-detail="${esc(o.order_no)}">詳細・写真</button></div></div></article>`}
function renderWorkflow(){const list=visible();const groups=[{key:"reserved",title:"確認待ち",statuses:["reserved"]},{key:"confirmed",title:"製作待ち",statuses:["confirmed"]},{key:"preparing",title:"製作中",statuses:["preparing"]},{key:"ready",title:"受取待ち",statuses:["ready"]},{key:"attention",title:"取消・要確認",statuses:["cancel_requested"]},{key:"done",title:"完了・履歴",statuses:["handed_over","cancelled","no_show"]}];const html=groups.map(g=>{let rows=list.filter(o=>g.statuses.includes(o.order_status));if(g.key==="attention")rows=list.filter(o=>o.order_status==="cancel_requested"||Boolean(o.allergy_notes)&&!["handed_over","cancelled"].includes(o.order_status));if(!rows.length)return"";return `<section class="section"><div class="sectionhead"><h2>${g.title}</h2><span class="count">${rows.length}</span></div><div class="cards">${rows.map(card).join("")}</div></section>`}).join("");$("workflow").innerHTML=html||'<div class="empty">該当する予約はありません。</div>';bindOrderButtons()}
function renderTimeGroups(){const map=new Map;orders.forEach(o=>{const t=tm(o.pickup_time)||"時刻未設定";if(!map.has(t))map.set(t,[]);map.get(t).push(o)});const rows=[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0]));$("timeGroups").innerHTML=rows.length?rows.map(([time,list])=>{const total=list.reduce((s,o)=>s+(o.cake_order_items||[]).reduce((x,i)=>x+Number(i.quantity||0),0),0);const ready=list.filter(o=>o.order_status==="ready").length;const paid=list.filter(o=>o.payment_status==="paid").length;const products=new Map;list.forEach(o=>(o.cake_order_items||[]).forEach(i=>{const k=`${i.product_name}｜${i.variant_name||""}`;products.set(k,(products.get(k)||0)+Number(i.quantity||0))}));return `<article class="group"><div class="grouptop"><h3>${time} 受取</h3><button class="btn sub" data-time-open="${time}">${list.length}件を表示</button></div><div class="groupgrid"><div class="groupstat">予約 <strong>${list.length}件</strong></div><div class="groupstat">商品 <strong>${total}点</strong></div><div class="groupstat">受取可能 ${ready}件／支払済 ${paid}件</div></div><div class="aggregate">${[...products.entries()].map(([name,qty])=>`<div class="aggrow"><span>${esc(name)}</span><b>${qty}点</b></div>`).join("")}</div></article>`}).join(""):'<div class="empty">この日の予約はありません。</div>';document.querySelectorAll("[data-time-open]").forEach(b=>b.onclick=()=>{view="workflow";filter="all";document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.view==="workflow"));document.querySelectorAll(".view").forEach(x=>x.classList.add("hidden"));$("workflowView").classList.remove("hidden");$("search").value=b.dataset.timeOpen;renderWorkflow()})}
function renderProductGroups(){const map=new Map;orders.filter(o=>!["cancelled","no_show"].includes(o.order_status)).forEach(o=>(o.cake_order_items||[]).forEach(i=>{const k=`${i.product_name}｜${i.variant_name||""}`;const v=map.get(k)||{name:i.product_name,variant:i.variant_name||"",qty:0,orders:0,points:0,notes:[],allergy:0};v.qty+=Number(i.quantity||0);v.orders+=1;v.points+=Number(i.production_points||0);if(quickSpecs(i))v.notes.push(quickSpecs(i).replace(/<br>/g,"／"));if(o.allergy_notes)v.allergy+=1;map.set(k,v)}));const rows=[...map.values()].sort((a,b)=>b.qty-a.qty||a.name.localeCompare(b.name,"ja"));$("productGroups").innerHTML=rows.length?rows.map(v=>`<article class="group"><div class="grouptop"><div><h3>${esc(v.name)}</h3><div class="small">${esc(v.variant)}</div></div><span class="count">${v.qty}</span></div><div class="groupgrid"><div class="groupstat">合計 <strong>${v.qty}点</strong></div><div class="groupstat">予約 <strong>${v.orders}件</strong></div><div class="groupstat">アレルギー注意 <strong>${v.allergy}件</strong></div></div>${v.notes.length?`<div class="alert">指定：${[...new Set(v.notes)].map(esc).join("<br>")}</div>`:""}</article>`).join(""):'<div class="empty">集計対象の商品はありません。</div>'}
function renderAll(){renderSummary();renderWorkflow();renderTimeGroups();renderProductGroups()}
function bindOrderButtons(){document.querySelectorAll("[data-next]").forEach(b=>b.onclick=()=>advance(b.dataset.order,b.dataset.next));document.querySelectorAll("[data-detail]").forEach(b=>b.onclick=()=>openDetail(b.dataset.detail))}
async function advance(no,next){if(isPast())return toast("過去日の予約は変更できません。",true);const order=orders.find(o=>o.order_no===no);if(!order)return;if(next==="handed_over"&&order.payment_status!=="paid"){openPayment(order);return}const labels={confirmed:"予約確認",preparing:"製作開始",ready:"完成・受取可能",handed_over:"受渡完了",cancelled:"取消確定"};if(!confirm(`${no} を「${labels[next]}」に更新しますか？`))return;try{await api(`/api/admin/orders/${encodeURIComponent(no)}/status`,{method:"PATCH",body:JSON.stringify({status:next,changed_by:"owner-ipad",note:`${labels[next]}（スタッフiPad）`})});toast("状態を更新しました。");await load()}catch(e){toast(e.message,true)}}
async function openDetail(no){$("detailModal").classList.remove("hidden");$("detailTitle").textContent=`予約詳細 ${no}`;$("detailBody").innerHTML='<div class="empty">詳細を読み込んでいます…</div>';try{const d=await api(`/api/admin/orders/${encodeURIComponent(no)}`);detailOrder=d.order;renderDetail()}catch(e){$("detailBody").innerHTML=`<div class="notice error">${esc(e.message)}</div>`}}
function renderDetail(){const o=detailOrder;if(!o)return;const photos=o.cake_order_photos||[];$("detailBody").innerHTML=`<div class="detailgrid"><div class="detailbox"><span class="small">受取日時</span><br><strong>${formatDate(o.pickup_date)} ${tm(o.pickup_time)}</strong></div><div class="detailbox"><span class="small">お客様</span><br><strong>${esc(o.customer_name)} 様</strong><br>${esc(o.phone||"")}</div><div class="detailbox"><span class="small">予約状態</span><br><span class="badge ${esc(o.order_status)}">${esc(statusLabel(o.order_status))}</span></div><div class="detailbox"><span class="small">支払い</span><br><span class="badge ${o.payment_status==="paid"?"paid":"unpaid"}">${paymentLabel(o.payment_status)}／${esc(methodLabel(o.payment_method))}</span></div>${o.allergy_notes?`<div class="detailbox full alert red">⚠ アレルギー：${esc(o.allergy_notes)}</div>`:""}${o.customer_note?`<div class="detailbox full"><strong>お客様希望</strong><br>${esc(o.customer_note)}</div>`:""}${o.staff_note?`<div class="detailbox full"><strong>スタッフメモ</strong><br>${esc(o.staff_note)}</div>`:""}</div><div class="detailitems">${(o.cake_order_items||[]).map(i=>`<article class="detailitem"><div class="itemtop"><strong>${esc(i.product_name)}／${esc(i.variant_name||"")}</strong><span class="qty">× ${Number(i.quantity||0)}</span></div>${quickSpecs(i)?`<div class="alert">${quickSpecs(i)}</div>`:""}${(i.cake_order_item_options||[]).length?`<div>${i.cake_order_item_options.map(x=>`<div class="optionline">${esc(x.option_name)}${x.option_text?`：${esc(x.option_text)}`:""}</div>`).join("")}</div>`:""}</article>`).join("")}</div>${photos.length?`<h3>参考・記録写真</h3><div class="photos">${photos.map(p=>`<a class="photo" href="${esc(p.signed_url||"#")}" target="_blank" rel="noopener">${p.signed_url?`<img src="${esc(p.signed_url)}" alt="${esc(p.photo_type||"写真")}">`:"写真を表示できません"}</a>`).join("")}</div>`:'<div class="alert blue">登録された参考写真はありません。</div>'}<div class="modalactions"><button class="btn sub" id="detailCloseButton">閉じる</button>${!isPast()&&nextAction(o)?`<button class="btn green" id="detailAdvance">${nextAction(o)[1]}</button>`:""}</div>`;$("detailCloseButton").onclick=closeDetail;const a=$("detailAdvance");if(a)a.onclick=()=>{closeDetail();advance(o.order_no,nextAction(o)[0])}}
function closeDetail(){$("detailModal").classList.add("hidden");detailOrder=null}
function openPayment(o){paymentOrder=o;$("paymentOrder").textContent=`${o.order_no}／${o.customer_name} 様`;$("paymentAmount").textContent=yen(o.total_amount);$("paymentMethod").textContent=methodLabel(o.payment_method);$("paymentAck").checked=false;$("confirmPayment").disabled=true;$("paymentModal").classList.remove("hidden")}
function closePayment(){$("paymentModal").classList.add("hidden");paymentOrder=null}
async function confirmPaymentAndHandover(){if(!paymentOrder||!$("paymentAck").checked)return;const o=paymentOrder;$("confirmPayment").disabled=true;$("confirmPayment").textContent="保存しています…";try{await api(`/api/admin/orders/${encodeURIComponent(o.order_no)}/payment`,{method:"PATCH",body:JSON.stringify({payment_status:"paid",changed_by:"owner-ipad"})});await api(`/api/admin/orders/${encodeURIComponent(o.order_no)}/status`,{method:"PATCH",body:JSON.stringify({status:"handed_over",changed_by:"owner-ipad",note:"支払い確認済み・受渡完了（スタッフiPad）"})});closePayment();toast("支払い確認と受渡完了を保存しました。");await load()}catch(e){toast(e.message,true)}finally{$("confirmPayment").textContent="支払い確認・受渡完了";$("confirmPayment").disabled=!$("paymentAck").checked}}
$("targetDate").value=jst();updateDateMode();$("login").onclick=login;$("adminCode").onkeydown=e=>{if(e.key==="Enter")login()};$("clearCode").onclick=()=>{$("adminCode").value="";$("adminCode").focus()};$("reload").onclick=load;$("targetDate").onchange=load;$("prevDate").onclick=()=>{$("targetDate").value=addDays($("targetDate").value,-1);load()};$("todayDate").onclick=()=>{$("targetDate").value=jst();load()};$("nextDate").onclick=()=>{$("targetDate").value=addDays($("targetDate").value,1);load()};$("search").oninput=renderWorkflow;document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll("[data-filter]").forEach(x=>x.classList.toggle("active",x===b));renderWorkflow()});document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{view=b.dataset.view;document.querySelectorAll("[data-view]").forEach(x=>x.classList.toggle("active",x===b));document.querySelectorAll(".view").forEach(x=>x.classList.add("hidden"));$(`${view}View`).classList.remove("hidden")});$("closeDetail").onclick=closeDetail;$("detailModal").onclick=e=>{if(e.target===$("detailModal"))closeDetail()};$("closePayment").onclick=closePayment;$("cancelPayment").onclick=closePayment;$("paymentModal").onclick=e=>{if(e.target===$("paymentModal"))closePayment()};$("paymentAck").onchange=()=>$("confirmPayment").disabled=!$("paymentAck").checked;$("confirmPayment").onclick=confirmPaymentAndHandover;document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeDetail();closePayment()}});$("logout").onclick=()=>{sessionStorage.removeItem("cake_admin_key");location.reload()};const q=new URLSearchParams(location.search),isDemo=q.get("demo")==="1",saved=sessionStorage.getItem("cake_admin_key");document.querySelectorAll("[data-demo-link]").forEach(a=>a.href=a.dataset.path+(isDemo?"?demo=1":""));if(isDemo){$("adminCode").value="1234";login()}else if(saved){$("adminCode").value=saved;login()}
})();
</script>
</body>
</html>
